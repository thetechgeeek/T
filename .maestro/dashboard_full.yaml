appId: com.easystock.app
---
# E2E-002: Dashboard full flow — stats, quick actions, recent invoices
- runFlow: shared/login_seeded.yaml
- assertVisible:
      id: 'dashboard-screen'
- assertVisible:
      id: 'stat-today-sales'
- assertVisible:
      id: 'stat-outstanding'
- assertVisible:
      id: 'stat-low-stock'
- takeScreenshot: dashboard_stats_visible

# Quick Actions are visible
- assertVisible:
      id: 'quick-action-new-invoice'
- assertVisible:
      id: 'quick-action-add-stock'
# Pull to refresh dashboard
- swipe:
      direction: DOWN
      duration: 300
- swipe:
      direction: UP
      duration: 300
- assertVisible:
      id: 'dashboard-screen'
- takeScreenshot: dashboard_after_refresh
