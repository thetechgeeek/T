appId: com.easystock.app
---
# E2E-Scan: Scan tab — manual entry search
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-scan'
# Grant camera permission if prompted
- tapOn:
      id: 'grant-camera-permission'
      optional: true

# Manual entry controls should be visible after permission is granted
- assertVisible:
      id: 'manual-entry-input'
- takeScreenshot: scan_tab

# Test manual search
- tapOn:
      id: 'manual-entry-input'
- inputText: 'GLOSSY'
- tapOn:
      id: 'scan-search-button'
- assertVisible:
      id: 'inventory-detail-screen'
- takeScreenshot: scan_search_result
