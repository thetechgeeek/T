appId: com.easystock.app
---
# E2E-014: Happy path — login from seed, create a quick paid invoice, return to dashboard
- runFlow: shared/login_seeded.yaml
- assertVisible:
      label: 'quick-action-new-invoice'
- tapOn:
      label: 'quick-action-new-invoice'
- assertVisible:
      label: 'invoice-step-1'
- tapOn:
      label: 'customer-name-input'
- inputText: 'Happy Path Customer'
- tapOn:
      label: 'customer-phone-input'
- inputText: '9876500077'
- tapOn:
      label: 'invoice-next-button'
- assertVisible:
      label: 'invoice-step-2'
- tapOn:
      label: 'add-item-button'
- tapOn:
      label: 'GLOSSY WHITE 60x60'
- tapOn:
      label: 'item-quantity-input'
- eraseText
- inputText: '1'
- tapOn:
      label: 'confirm-add-item'
- tapOn:
      label: 'invoice-next-button'
- assertVisible:
      label: 'invoice-step-3'
- tapOn:
      label: 'paid-in-full-chip'
- tapOn:
      label: 'generate-invoice-button'
- assertVisible:
      label: 'invoice-detail-screen'
- tapOn:
      label: 'tab-dashboard'
- assertVisible:
      label: 'dashboard-screen'
- takeScreenshot: happy_path_complete
