appId: com.easystock.app
---
# E2E-001b: Invalid login shows inline error
- launchApp:
      clearState: true
- openLink: '${E2E_DEV_CLIENT_URL}'
- tapOn:
      text: 'Open'
      optional: true
- tapOn:
      text: 'Continue'
      optional: true
- assertVisible:
      id: 'email-input'
- assertVisible:
      id: 'password-input'
- assertVisible:
      id: 'sign-in-button'
- tapOn:
      id: 'email-input'
- inputText: 'wrong@tilemaster.dev'
- tapOn:
      id: 'password-input'
- inputText: 'WrongPassword!'
- tapOn:
      id: 'sign-in-button'
- assertVisible:
      text: 'Invalid credentials.'
- takeScreenshot: auth_login_failure
