appId: com.easystock.app
---
# E2E-008: Finance overview — stats, navigation to sub-sections
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- tapOn:
      id: 'menu-finance'
- assertVisible:
      id: 'stat-gross-profit'
- takeScreenshot: finance_overview

# Verify metric cards visible
- assertVisible:
      id: 'stat-gross-profit'
- assertVisible:
      id: 'stat-net-profit'
- assertVisible:
      id: 'stat-total-expenses'
- takeScreenshot: finance_metrics

# Navigate to Expenses
- assertVisible:
      id: 'menu-expenses'
- tapOn:
      id: 'menu-expenses'
- assertVisible:
      id: 'expenses-screen'
- takeScreenshot: finance_expenses

# Go back
- tapOn:
      text: 'Go back'
- assertVisible:
      id: 'menu-aging-report'
# Navigate to Aging Report
- tapOn:
      id: 'menu-aging-report'
- assertVisible:
      id: 'aging-report-screen'
- assertVisible:
      id: 'aging-total-outstanding-card'
- takeScreenshot: aging_report

- tapOn:
      text: 'Go back'
- assertVisible:
      id: 'stat-gross-profit'