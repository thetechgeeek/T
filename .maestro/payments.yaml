appId: com.easystock.app
---
# E2E-007: Payments flow — record payment from finance receive-payment screen
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- tapOn:
      id: 'menu-finance'
- assertVisible:
      id: 'receive-payment'
- tapOn:
      id: 'receive-payment'
- assertVisible:
      id: 'receive-payment-screen'
- tapOn:
      id: 'customer-search'
- inputText: 'Seeded Customer Alpha'
- tapOn:
      id: 'payment-customer-Seeded Customer Alpha'
- tapOn:
      id: 'amount-received'
- inputText: '1000'
- tapOn:
      id: 'payment-mode-upi'
- tapOn:
      id: 'save-payment'
- tapOn:
      text: 'OK'
      optional: true
- assertVisible:
      id: 'receive-payment'
- takeScreenshot: payments_recorded
