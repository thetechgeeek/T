appId: com.easystock.app
---
- runFlow: ../shared/login_seeded.yaml
- tapOn:
      id: 'tab-invoices'
- assertVisible:
      id: 'invoices-screen'
- tapOn:
      id: 'new-invoice-button'
- assertVisible:
      id: 'invoice-step-1-content'
- takeScreenshot: invoice-step-1-open
- tapOn:
      id: 'customer-name-input'
- inputText: 'Seeded Counter Sale'
- takeScreenshot: invoice-step-1-after-name
- assertVisible:
      text: 'Seeded Counter Sale'
- tapOn:
      point: '87%,89%'
- inputText: '9876500099'
- takeScreenshot: invoice-step-1-after-input
- assertVisible:
      text: '9876500099'
- tapOn:
      id: 'invoice-next-button'
- assertVisible:
      id: 'invoice-step-2-content'
- takeScreenshot: invoice-step-2-open
- tapOn:
      id: 'add-item-button'
- tapOn:
      text: 'GLOSSY WHITE 60x60'
- takeScreenshot: invoice-step-2-item-selected
- tapOn:
      id: 'confirm-add-item'
- assertVisible:
      id: 'invoice-line-item-0'
- takeScreenshot: invoice-step-2-item-added
- tapOn:
      id: 'invoice-next-button'
- assertVisible:
      id: 'invoice-step-3-content'
- tapOn:
      id: 'paid-in-full-chip'
- tapOn:
      id: 'generate-invoice-button'
- assertVisible:
      id: 'invoice-detail-screen'
