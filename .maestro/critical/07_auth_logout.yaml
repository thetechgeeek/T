appId: com.easystock.app
---
- runFlow: ../shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- assertVisible:
      id: 'more-screen'
- scrollUntilVisible:
      element:
            id: 'sign-out-button'
      direction: DOWN
- tapOn:
      id: 'sign-out-button'
- tapOn:
      point: '68%,56%'
- assertVisible:
      id: 'email-input'
