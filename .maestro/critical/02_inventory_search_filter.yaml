appId: com.easystock.app
---
- runFlow: ../shared/login_seeded.yaml
- takeScreenshot: inventory-before-tab
- tapOn:
      id: 'tab-inventory'
- assertVisible:
      id: 'inventory-screen'
- assertVisible:
      text: 'Inventory'
- takeScreenshot: inventory-screen-open
- tapOn:
      id: 'inventory-search-input'
- inputText: 'GLOSSY'
- assertVisible:
      text: 'GLOSSY WHITE 60x60'
- takeScreenshot: inventory-search-glossy
- tapOn:
      id: 'category-chip-GLOSSY'
- assertVisible:
      text: 'GLOSSY WHITE 60x60'
- takeScreenshot: inventory-glossy-filter
