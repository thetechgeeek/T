appId: com.easystock.app
---
# E2E-006: Customer management — list, add, view detail
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- assertVisible:
      id: 'more-screen'
- tapOn:
      id: 'menu-customers'
- assertVisible:
      id: 'customers-screen'
- takeScreenshot: customers_list

# Add a new customer
- tapOn:
      id: 'add-customer-button'
- tapOn:
      id: 'customer-name-input'
- inputText: 'E2E Tiles Ltd'
- tapOn:
      id: 'customer-phone-input'
- inputText: '9876500098'
- tapOn:
      id: 'save-customer-button'
- assertVisible:
      id: 'customers-screen'
- assertVisible:
      id: 'customer-row-9876500098'
- takeScreenshot: customer_added

# View customer detail (tap first customer)
- tapOn:
      id: 'customer-row-9876500098'
- assertVisible:
      id: 'customer-detail-screen'
- takeScreenshot: customer_detail
