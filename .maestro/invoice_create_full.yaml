appId: com.easystock.app
---
# E2E-003: Full invoice creation wizard
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-invoices'
- assertVisible:
      id: 'invoices-screen'
- tapOn:
      id: 'new-invoice-button'
- assertVisible:
      id: 'invoice-step-1'
- takeScreenshot: invoice_step1_customer

# Step 1: Enter customer name
- tapOn:
      id: 'customer-name-input'
- inputText: 'E2E Test Customer'
- tapOn:
      id: 'customer-phone-input'
- inputText: '9876500097'
- tapOn:
      id: 'invoice-next-button'
# Step 2: Add items
- assertVisible:
      id: 'invoice-step-2'
- takeScreenshot: invoice_step2_items
- tapOn:
      id: 'add-item-button'
- tapOn:
      text: 'GLOSSY WHITE 60x60'
- tapOn:
      id: 'item-quantity-input'
- eraseText
- inputText: '5'
- tapOn:
      id: 'confirm-add-item'
# Verify item added
- assertVisible:
      id: 'remove-line-item-0'
- tapOn:
      id: 'invoice-next-button'
# Step 3: Review
- assertVisible:
      id: 'invoice-step-3'
- assertVisible:
      id: 'balance-due-indicator'
- takeScreenshot: invoice_step3_review

# Generate
- tapOn:
      id: 'paid-in-full-chip'
- tapOn:
      id: 'generate-invoice-button'
- assertVisible:
      id: 'invoice-detail-screen'
- takeScreenshot: invoice_created_success
