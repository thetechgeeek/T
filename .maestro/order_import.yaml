appId: com.easystock.app
---
# E2E-009: Order import — navigate to orders, view import screen
- runFlow: shared/login_seeded.yaml
- tapOn:
      label: 'tab-more'
- tapOn:
      label: 'menu-orders'
- assertVisible:
      label: 'orders-screen'
- takeScreenshot: orders_list

# Tap import button and verify the import surface opens
- tapOn:
      label: 'import-pdf-button'
- assertVisible:
      label: 'order-import-screen'
- takeScreenshot: order_import_screen
