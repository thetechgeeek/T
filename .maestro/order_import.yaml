appId: com.tilemaster.app
---
# E2E-009: Order import — navigate to orders, view import screen
- launchApp
- tapOn:
    label: "tab-more"
- tapOn:
    label: "menu-orders"
- assertVisible:
    label: "orders-screen"
- takeScreenshot: orders_list

# Tap import button if available
- tapOn:
    label: "import-pdf-button"
    optional: true
- assertVisible:
    text: "Import"
    optional: true
- takeScreenshot: order_import_screen

# Go back to orders
- tapOn:
    text: "Back"
    optional: true
- assertVisible:
    label: "orders-screen"
    optional: true
