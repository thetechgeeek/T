appId: com.easystock.app
---
# E2E-005: Inventory management — browse, search, add item
- runFlow: shared/login_seeded.yaml
- assertVisible:
      id: 'tab-inventory'
- tapOn:
      id: 'tab-inventory'
- assertVisible:
      id: 'inventory-screen'
- takeScreenshot: inventory_list

# Category filter chips visible
- assertVisible:
      id: 'category-chip-ALL'
- assertVisible:
      id: 'category-chip-GLOSSY'
# Search for an item
- tapOn:
      id: 'inventory-search-input'
- inputText: 'GLOSSY'
- assertVisible:
      text: 'GLOSSY WHITE 60x60'
- takeScreenshot: inventory_search_results

- tapOn:
      id: 'category-chip-GLOSSY'
- assertVisible:
      text: 'GLOSSY WHITE 60x60'
- takeScreenshot: inventory_glossy_filter
