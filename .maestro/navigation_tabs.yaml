appId: com.easystock.app
---
# E2E-012: Tab navigation — all bottom tabs accessible
- runFlow: shared/login_seeded.yaml
- assertVisible:
      id: 'dashboard-screen'
- takeScreenshot: nav_dashboard

# Navigate to Invoices tab
- tapOn:
      id: 'tab-invoices'
- assertVisible:
      id: 'invoices-screen'
- takeScreenshot: nav_invoices

# Navigate to Inventory tab
- tapOn:
      id: 'tab-inventory'
- assertVisible:
      id: 'inventory-screen'
- takeScreenshot: nav_inventory

# Navigate to Scan tab
- tapOn:
      id: 'tab-scan'
- takeScreenshot: nav_scan

# Navigate to More tab
- tapOn:
      id: 'tab-more'
- assertVisible:
      id: 'more-screen'
- takeScreenshot: nav_more

# Return to Dashboard
- tapOn:
      id: 'tab-dashboard'
- assertVisible:
      id: 'dashboard-screen'
- takeScreenshot: nav_return_dashboard
