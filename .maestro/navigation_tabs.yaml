appId: com.tilemaster.app
---
# E2E-012: Tab navigation — all bottom tabs accessible
- launchApp
- assertVisible:
    label: "dashboard-screen"
- takeScreenshot: nav_dashboard

# Navigate to Invoices tab
- tapOn:
    label: "tab-invoices"
- assertVisible:
    label: "invoices-screen"
- takeScreenshot: nav_invoices

# Navigate to Inventory tab
- tapOn:
    label: "tab-inventory"
- assertVisible:
    label: "inventory-screen"
- takeScreenshot: nav_inventory

# Navigate to Scan tab
- tapOn:
    label: "tab-scan"
- takeScreenshot: nav_scan

# Navigate to More tab
- tapOn:
    label: "tab-more"
- assertVisible:
    label: "more-screen"
- takeScreenshot: nav_more

# Return to Dashboard
- tapOn:
    label: "tab-dashboard"
- assertVisible:
    label: "dashboard-screen"
- takeScreenshot: nav_return_dashboard
