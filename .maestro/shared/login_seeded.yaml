appId: com.easystock.app
---
- launchApp:
      clearState: true
- tapOn:
      text: 'http://localhost:8081'
      optional: true
- tapOn:
      text: 'Open'
      optional: true
- tapOn:
      text: 'Continue'
      optional: true
- assertVisible:
      label: 'sign-in-heading'
- assertVisible:
      label: 'email-input'
- assertVisible:
      label: 'password-input'
- assertVisible:
      label: 'sign-in-button'
- tapOn:
      label: 'email-input'
- inputText: '${INTEGRATION_TEST_EMAIL}'
- tapOn:
      label: 'password-input'
- inputText: '${INTEGRATION_TEST_PASSWORD}'
- tapOn:
      label: 'sign-in-button'
- assertVisible:
      label: 'dashboard-screen'
- assertVisible:
      label: 'tab-dashboard'
