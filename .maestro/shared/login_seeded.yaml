appId: com.easystock.app
---
- launchApp:
      clearState: true
- openLink: '${E2E_DEV_CLIENT_URL}'
- tapOn:
      text: 'Open'
      optional: true
- tapOn:
      text: 'Continue'
      optional: true
- assertVisible:
      id: 'sign-in-heading'
- assertVisible:
      id: 'email-input'
- assertVisible:
      id: 'password-input'
- assertVisible:
      id: 'sign-in-button'
- tapOn:
      id: 'email-input'
- inputText: '${INTEGRATION_TEST_EMAIL}'
- tapOn:
      id: 'password-input'
- inputText: '${INTEGRATION_TEST_PASSWORD}'
- tapOn:
      point: '87%,89%'
- assertVisible:
      id: 'dashboard-screen'
- assertVisible:
      id: 'tab-dashboard'
- takeScreenshot: seeded-login-dashboard
