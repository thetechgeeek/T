appId: com.easystock.app
---
# E2E-001c: Logout flow
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- assertVisible:
      id: 'sign-out-button'
- tapOn:
      id: 'sign-out-button'
- tapOn:
      text: 'Sign Out'
      optional: true
- assertVisible:
      id: 'email-input'
- takeScreenshot: auth_logout_success
