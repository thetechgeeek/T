appId: com.easystock.app
---
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-invoices'
- assertVisible:
      id: 'invoices-screen'
- tapOn:
      id: 'new-invoice-button'
- assertVisible:
      id: 'invoice-step-1'
- tapOn:
      id: 'customer-name-input'
- inputText: 'Invoice Flow Customer'
- tapOn:
      id: 'customer-phone-input'
- inputText: '9876500088'
- tapOn:
      id: 'invoice-next-button'
- assertVisible:
      id: 'invoice-step-2'
- tapOn:
      id: 'add-item-button'
- tapOn:
      text: 'GLOSSY WHITE 60x60'
- tapOn:
      id: 'item-quantity-input'
- eraseText
- inputText: '2'
- tapOn:
      id: 'confirm-add-item'
- tapOn:
      id: 'invoice-next-button'
- assertVisible:
      id: 'invoice-step-3'
- tapOn:
      id: 'paid-in-full-chip'
- tapOn:
      id: 'generate-invoice-button'
- assertVisible:
      id: 'invoice-detail-screen'
- takeScreenshot: invoice_created
