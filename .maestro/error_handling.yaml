appId: com.easystock.app
---
# E2E-013: Form validation — customer save rejects invalid mobile number
- runFlow: shared/login_seeded.yaml
- tapOn:
      id: 'tab-more'
- tapOn:
      id: 'menu-customers'
- tapOn:
      id: 'add-customer-button'
- tapOn:
      id: 'customer-name-input'
- inputText: 'Validation Customer'
- tapOn:
      id: 'customer-phone-input'
- inputText: '123'
- tapOn:
      id: 'save-customer-button'
- assertVisible:
      text: 'Enter a valid 10-digit Indian mobile number'
- takeScreenshot: customer_validation_error
