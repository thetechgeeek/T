<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Books — Inventory / Ledger / GST</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="stylesheet" href="tokens/base.css">
<style>
  html, body { height: 100%; margin: 0; background: #08090a; overflow: hidden; font-family: "Geist", sans-serif; }
  .stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse at 20% 20%, rgba(94,106,210,0.08), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(244,114,182,0.08), transparent 50%),
      #08090a;
    padding: 20px;
  }
  .tweak-toggle {
    position: fixed; top: 14px; right: 14px; z-index: 300;
    display: inline-flex; align-items: center; gap: 6px;
    background: #111113; color: #f2f2f5;
    border: 1px solid #26272b; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; font-family: "Geist", sans-serif; font-size: 12px; font-weight: 600;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }
  .tweak-toggle:hover { background: #1a1b1e; }
  .screen-label {
    position: fixed; top: 16px; left: 16px; z-index: 300;
    color: #8a8f98; font-size: 11px; font-family: "Geist Mono", monospace;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .books-nav {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; padding: 8px 4px 22px;
    background: color-mix(in srgb, var(--c-surface) 85%, transparent);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--c-divider); z-index: 10;
    overflow-x: auto;
  }
  .books-nav button {
    flex: 1; min-width: 54px;
    border: 0; background: transparent; display: flex; flex-direction: column; align-items: center;
    gap: 2px; padding: 6px 4px; color: var(--c-textSubtle); font-family: var(--f-sans);
    font-size: 10px; cursor: pointer;
  }
  .books-nav button[data-active="1"] { color: var(--c-primary); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="tokens/themes.js"></script>
</head>
<body>
<div class="screen-label" id="screen-label"></div>
<button class="tweak-toggle" id="tweak-toggle">⚙ Tweaks</button>
<div class="stage" id="stage"></div>

<script type="text/babel" src="frames/ios-frame.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/illustrations.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel" src="components/tweaks.jsx"></script>
<script type="text/babel" src="books/screens-1.jsx"></script>
<script type="text/babel" src="books/screens-2.jsx"></script>
<script type="text/babel" src="books/screens-3.jsx"></script>

<script type="text/babel">
const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "linear",
  "mode": "light",
  "accent": "sky",
  "density": "spacious",
  "radius": "soft",
  "font": "geist",
  "illustration": "geometric",
  "motion": "full",
  "screen": "home"
}/*EDITMODE-END*/;

const STORAGE = 'books-ds-v1';

const SCREENS = [
  { id: 'home',         label: 'Home',      icon: 'home',      comp: 'BooksHome' },
  { id: 'inventory',    label: 'Inventory', icon: 'briefcase', comp: 'BooksInventory' },
  { id: 'product',      label: 'Product',   icon: 'file',      comp: 'BooksProduct' },
  { id: 'lowstock',     label: 'Low stock', icon: 'alert',     comp: 'BooksLowStock' },
  { id: 'invoices',     label: 'Invoices',  icon: 'inbox',     comp: 'BooksInvoiceList' },
  { id: 'invoice_new',  label: 'New inv.',  icon: 'plus',      comp: 'BooksInvoiceNew' },
  { id: 'party',        label: 'Party',     icon: 'user',      comp: 'BooksParty' },
  { id: 'reports',      label: 'Reports',   icon: 'pie',       comp: 'BooksReports' },
  { id: 'receipts',     label: 'Pay',       icon: 'coins',     comp: 'BooksReceipts' },
  { id: 'journal',      label: 'Journal',   icon: 'swap',      comp: 'BooksJournal' },
];

function App() {
  const [config, setConfigRaw] = React.useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE) || 'null');
      return { ...DEFAULTS, ...(saved || {}) };
    } catch { return DEFAULTS; }
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [product, setProduct] = React.useState(null);

  const setConfig = (c) => {
    setConfigRaw(c);
    try { localStorage.setItem(STORAGE, JSON.stringify(c)); } catch {}
  };

  React.useEffect(() => {
    window.applyTheme(config);
    const cur = SCREENS.find(s => s.id === config.screen) || SCREENS[0];
    document.getElementById('screen-label').textContent =
      `Books · ${window.THEMES[config.theme].name} · ${config.mode} · ${cur.label}`;
  }, [config]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent?.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  React.useEffect(() => {
    window.parent?.postMessage({ type: '__edit_mode_set_keys', edits: config }, '*');
  }, [config]);

  const isDark = config.mode === 'dark';
  const cur = SCREENS.find(s => s.id === config.screen) || SCREENS[0];
  const Screen = window[cur.comp];

  const onNav = (id) => setConfig({ ...config, screen: id });
  const onOpenProduct = (p) => { setProduct(p); onNav('product'); };
  const onBack = () => onNav('inventory');

  // pick which nav items are primary
  const primary = ['home','inventory','invoices','reports'];
  const primaryNav = SCREENS.filter(s => primary.includes(s.id));

  const screenProps = {
    onNav,
    onBack: () => {
      // back goes to a logical parent
      if (config.screen === 'product') onNav('inventory');
      else if (config.screen === 'invoice_new') onNav('invoices');
      else if (config.screen === 'party') onNav('invoices');
      else if (config.screen === 'journal') onNav('reports');
      else onNav('home');
    },
    onOpenProduct,
    product,
  };

  return (
    <>
      <IOSDevice width={402} height={874} dark={isDark} title={cur.label}>
        <div className="app" data-screen-label={cur.label}>
          <div style={{paddingBottom:0,height:'100%',overflowY:'auto'}}>
            {Screen ? <Screen {...screenProps}/> : <div style={{padding:16}}>Loading…</div>}
          </div>
          <div className="books-nav">
            {primaryNav.map(s => (
              <button key={s.id} data-active={config.screen === s.id ? '1' : '0'} onClick={() => onNav(s.id)}>
                {I[s.icon]({size:20})}<span>{s.label}</span>
              </button>
            ))}
            {/* Extra jump menu for screens not in bottom nav */}
            <button data-active={!primary.includes(config.screen) ? '1':'0'} onClick={()=>{
              const idx = SCREENS.findIndex(s=>s.id===config.screen);
              const next = SCREENS[(idx+1)%SCREENS.length];
              onNav(next.id);
            }}>
              {I.grid({size:20})}<span>More</span>
            </button>
          </div>
        </div>
      </IOSDevice>
      {tweaksOpen && <TweaksPanel config={config} setConfig={setConfig} onClose={() => setTweaksOpen(false)} screens={SCREENS}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('stage')).render(<App/>);

document.getElementById('tweak-toggle').addEventListener('click', () => {
  window.postMessage({ type: '__activate_edit_mode' }, '*');
});
</script>
</body>
</html>
