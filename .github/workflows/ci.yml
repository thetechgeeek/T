name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]
    schedule:
        - cron: '30 2 * * *'

permissions:
    contents: read

jobs:
    secret-scan:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        timeout-minutes: 10

        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Secret scan
              uses: gitleaks/gitleaks-action@v2
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    codeql:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: secret-scan
        timeout-minutes: 20
        permissions:
            actions: read
            contents: read
            security-events: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Initialize CodeQL
              uses: github/codeql-action/init@v3
              with:
                  languages: javascript-typescript

            - name: Analyze with CodeQL
              uses: github/codeql-action/analyze@v3

    validate:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: [secret-scan, codeql]
        timeout-minutes: 30

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies and verify lockfile integrity
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Security audit
              run: npm run audit:security

            - name: Type check
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Runtime boundary check
              run: npm run check:runtime-boundaries

            - name: Target architecture check
              run: npm run check:target-architecture

            - name: Product surface truthfulness check
              run: npm run check:product-surfaces

            - name: Supabase migration naming check
              run: npm run check:migrations

            - name: Database type contract check
              run: npm run check:db-types

            - name: Strict Jest
              run: npm run test:coverage

            - name: Upload coverage
              uses: codecov/codecov-action@v4
              if: always()
              with:
                  fail_ci_if_error: false

    backend-integration:
        if: github.event_name != 'schedule'
        runs-on: ubuntu-latest
        needs: validate
        timeout-minutes: 30
        outputs:
            ready: ${{ steps.backend-secrets.outputs.ready }}
        env:
            SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
            SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
            SUPABASE_TEST_PROJECT_REF_ALLOWLIST: ${{ secrets.SUPABASE_TEST_PROJECT_REF_ALLOWLIST }}
            EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            INTEGRATION_TEST_EMAIL: ${{ secrets.INTEGRATION_TEST_EMAIL }}
            INTEGRATION_TEST_PASSWORD: ${{ secrets.INTEGRATION_TEST_PASSWORD }}

        steps:
            - name: Check backend integration secrets
              id: backend-secrets
              shell: bash
              run: |
                  missing=()
                  for name in \
                    SUPABASE_TEST_URL \
                    SUPABASE_TEST_ANON_KEY \
                    SUPABASE_TEST_SERVICE_ROLE_KEY \
                    SUPABASE_TEST_PROJECT_REF_ALLOWLIST \
                    INTEGRATION_TEST_EMAIL \
                    INTEGRATION_TEST_PASSWORD
                  do
                    if [[ -z "${!name:-}" ]]; then
                      missing+=("$name")
                    fi
                  done

                  if (( ${#missing[@]} > 0 )); then
                    echo "ready=false" >> "$GITHUB_OUTPUT"
                    echo "::notice title=Backend integration skipped::Missing required GitHub secrets: ${missing[*]}"
                  else
                    echo "ready=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout
              if: steps.backend-secrets.outputs.ready == 'true'
              uses: actions/checkout@v4

            - name: Setup Node.js
              if: steps.backend-secrets.outputs.ready == 'true'
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              if: steps.backend-secrets.outputs.ready == 'true'
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Reset deterministic test seed
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npm run test:seed:reset

            - name: Run seeded integration suite
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npm run test:integration

    maestro-critical-ios:
        if: github.event_name != 'schedule' && needs['backend-integration'].outputs.ready == 'true'
        runs-on: macos-latest
        needs: backend-integration
        timeout-minutes: 75
        env:
            SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
            SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
            SUPABASE_TEST_PROJECT_REF_ALLOWLIST: ${{ secrets.SUPABASE_TEST_PROJECT_REF_ALLOWLIST }}
            EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            INTEGRATION_TEST_EMAIL: ${{ secrets.INTEGRATION_TEST_EMAIL }}
            INTEGRATION_TEST_PASSWORD: ${{ secrets.INTEGRATION_TEST_PASSWORD }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Install Maestro
              run: |
                  brew tap mobile-dev-inc/tap
                  brew install mobile-dev-inc/tap/maestro
                  maestro --version

            - name: Reset deterministic test seed
              run: npm run test:seed:reset

            - name: Start iOS simulator
              run: maestro start-device --platform ios --os-version 18 --force-create

            - name: Build iOS app
              run: npx expo run:ios -d "iPhone 11"

            - name: Run iOS critical app workflows
              run: npm run test:e2e:critical

    maestro-critical-android:
        if: github.event_name != 'schedule'
        runs-on: macos-latest
        needs: maestro-critical-ios
        timeout-minutes: 90
        env:
            SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
            SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
            SUPABASE_TEST_PROJECT_REF_ALLOWLIST: ${{ secrets.SUPABASE_TEST_PROJECT_REF_ALLOWLIST }}
            EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            INTEGRATION_TEST_EMAIL: ${{ secrets.INTEGRATION_TEST_EMAIL }}
            INTEGRATION_TEST_PASSWORD: ${{ secrets.INTEGRATION_TEST_PASSWORD }}
            ANDROID_SDK_ROOT: /opt/homebrew/share/android-commandlinetools
            ANDROID_HOME: /opt/homebrew/share/android-commandlinetools

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Install Maestro and Android tooling
              run: |
                  brew tap mobile-dev-inc/tap
                  brew install mobile-dev-inc/tap/maestro android-commandlinetools android-platform-tools
                  maestro --version

            - name: Accept Android licenses
              shell: bash
              run: |
                  set +o pipefail
                  yes | sdkmanager --licenses
                  set -o pipefail

            - name: Install Android SDK packages
              shell: bash
              run: |
                  sdkmanager --install \
                    "emulator" \
                    "platforms;android-35" \
                    "build-tools;35.0.0" \
                    "system-images;android-35;google_apis;arm64-v8a"

            - name: Reset deterministic test seed
              run: npm run test:seed:reset

            - name: Start Android emulator
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  maestro start-device --platform android --os-version 33 --force-create

            - name: Build Android app
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  npx expo run:android

            - name: Run Android critical app workflows
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  npm run test:e2e:critical

    design-system-ios:
        if: github.event_name != 'schedule'
        runs-on: macos-latest
        timeout-minutes: 60

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Install Maestro
              run: |
                  brew tap mobile-dev-inc/tap
                  brew install mobile-dev-inc/tap/maestro
                  maestro --version

            - name: Generate design-system artifacts
              run: npm run generate:design-system

            - name: Start iOS simulator
              run: maestro start-device --platform ios --os-version 18 --force-create

            - name: Build iOS app
              run: npx expo run:ios -d "iPhone 11"

            - name: Run iOS design-system native proof
              run: npm run test:design-system:ios

            - name: Upload iOS design-system artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: design-system-ios-proof
                  path: artifacts/design-system-proof/ios

    design-system-android:
        if: github.event_name != 'schedule'
        runs-on: macos-latest
        timeout-minutes: 75
        env:
            ANDROID_SDK_ROOT: /opt/homebrew/share/android-commandlinetools
            ANDROID_HOME: /opt/homebrew/share/android-commandlinetools

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Install Maestro and Android tooling
              run: |
                  brew tap mobile-dev-inc/tap
                  brew install mobile-dev-inc/tap/maestro android-commandlinetools android-platform-tools
                  maestro --version

            - name: Accept Android licenses
              shell: bash
              run: |
                  set +o pipefail
                  yes | sdkmanager --licenses
                  set -o pipefail

            - name: Install Android SDK packages
              shell: bash
              run: |
                  sdkmanager --install \
                    "emulator" \
                    "platforms;android-35" \
                    "build-tools;35.0.0" \
                    "system-images;android-35;google_apis;arm64-v8a"

            - name: Generate design-system artifacts
              run: npm run generate:design-system

            - name: Start Android emulator
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  maestro start-device --platform android --os-version 33 --force-create

            - name: Build Android app
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  npx expo run:android

            - name: Run Android design-system native proof
              shell: bash
              run: |
                  export PATH="$ANDROID_SDK_ROOT/emulator:$PATH"
                  npm run test:design-system:android

            - name: Upload Android design-system artifacts
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: design-system-android-proof
                  path: artifacts/design-system-proof/android

    nightly-full-suite:
        if: github.event_name == 'schedule'
        runs-on: macos-latest
        timeout-minutes: 120
        env:
            SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
            SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
            SUPABASE_TEST_PROJECT_REF_ALLOWLIST: ${{ secrets.SUPABASE_TEST_PROJECT_REF_ALLOWLIST }}
            EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_TEST_URL }}
            EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
            INTEGRATION_TEST_EMAIL: ${{ secrets.INTEGRATION_TEST_EMAIL }}
            INTEGRATION_TEST_PASSWORD: ${{ secrets.INTEGRATION_TEST_PASSWORD }}

        steps:
            - name: Check backend integration secrets
              id: backend-secrets
              shell: bash
              run: |
                  missing=()
                  for name in \
                    SUPABASE_TEST_URL \
                    SUPABASE_TEST_ANON_KEY \
                    SUPABASE_TEST_SERVICE_ROLE_KEY \
                    SUPABASE_TEST_PROJECT_REF_ALLOWLIST \
                    INTEGRATION_TEST_EMAIL \
                    INTEGRATION_TEST_PASSWORD
                  do
                    if [[ -z "${!name:-}" ]]; then
                      missing+=("$name")
                    fi
                  done

                  if (( ${#missing[@]} > 0 )); then
                    echo "ready=false" >> "$GITHUB_OUTPUT"
                    echo "::notice title=Nightly full suite skipped::Missing required GitHub secrets: ${missing[*]}"
                  else
                    echo "ready=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout
              if: steps.backend-secrets.outputs.ready == 'true'
              uses: actions/checkout@v4

            - name: Setup Node.js
              if: steps.backend-secrets.outputs.ready == 'true'
              uses: actions/setup-node@v6
              with:
                  node-version: '20.19.4'
                  cache: 'npm'

            - name: Install dependencies
              if: steps.backend-secrets.outputs.ready == 'true'
              # Temporary legacy-peer-deps exception documented in docs/PEER_DEPENDENCY_EXCEPTIONS.md; review by 2026-06-30.
              run: npm ci --legacy-peer-deps

            - name: Install Maestro
              if: steps.backend-secrets.outputs.ready == 'true'
              run: |
                  brew tap mobile-dev-inc/tap
                  brew install mobile-dev-inc/tap/maestro
                  maestro --version

            - name: Reset deterministic test seed
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npm run test:seed:reset

            - name: Run seeded integration suite
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npm run test:integration

            - name: Start iOS simulator
              if: steps.backend-secrets.outputs.ready == 'true'
              run: maestro start-device --platform ios --os-version 18 --force-create

            - name: Build iOS app
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npx expo run:ios -d "iPhone 11"

            - name: Run full Maestro suite
              if: steps.backend-secrets.outputs.ready == 'true'
              run: npm run test:e2e:full
